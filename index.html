<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Device Verification</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #f0f4f8; --glass-bg: rgba(255, 255, 255, 0.65);
            --glass-border: rgba(255, 255, 255, 0.4); --glass-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
            --text-main: #1e293b; --text-muted: #64748b; --accent-blue: #3b82f6;
            --success: #10b981; --danger: #ef4444; --neutral: #94a3b8;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, sans-serif; }
        body { background: linear-gradient(135deg, #e0e7ff 0%, #f3f4f6 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; color: var(--text-main); padding: 20px; }
        .glass-container { background: var(--glass-bg); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid var(--glass-border); border-radius: 24px; box-shadow: var(--glass-shadow); width: 100%; max-width: 400px; padding: 32px 24px; min-height: 480px; display: flex; flex-direction: column; }
        .screen { display: none; flex-direction: column; align-items: center; flex: 1; width: 100%; }
        .screen.active { display: flex; animation: fadeIn 0.4s ease forwards; }
        .header { text-align: center; margin-bottom: 24px; width: 100%; }
        .logo-icon { font-size: 42px; color: var(--accent-blue); margin-bottom: 12px; }
        .header h2 { font-size: 22px; font-weight: 600; }
        .header p { color: var(--text-muted); font-size: 14px; margin-top: 4px; }
        .profile-card { background: rgba(255, 255, 255, 0.5); border-radius: 16px; padding: 16px; width: 100%; display: flex; align-items: center; gap: 16px; margin-bottom: 24px; border: 1px solid rgba(255,255,255,0.8); }
        .profile-card.hidden { display: none; }
        .avatar { width: 48px; height: 48px; background: var(--accent-blue); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; }
        .profile-info h3 { font-size: 16px; margin-bottom: 4px; }
        .id-row { font-size: 13px; color: var(--text-muted); display: flex; align-items: center; gap: 8px; }
        .action-buttons { width: 100%; display: flex; flex-direction: column; gap: 12px; }
        .btn { width: 100%; padding: 14px; border-radius: 14px; border: none; font-size: 15px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; background: white; color: var(--text-main); box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .btn-success:hover { color: var(--success); }
        /* Sequential Loading UI */
        #loading-screen { justify-content: center; min-height: 350px; }
        .step-container { display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; text-align: center; opacity: 0; }
        .step-icon { font-size: 70px; color: var(--accent-blue); margin-bottom: 24px; filter: drop-shadow(0 4px 12px rgba(59, 130, 246, 0.3)); }
        .step-text { font-size: 18px; font-weight: 600; margin-bottom: 16px; }
        .spinner-small { width: 36px; height: 36px; border: 3px solid rgba(59, 130, 246, 0.2); border-top-color: var(--accent-blue); border-radius: 50%; animation: spin 1s linear infinite; }
        .result-icon { font-size: 64px; margin: 10px 0 20px 0; animation: scaleIn 0.5s forwards; }
        .result-icon.success { color: var(--success); }
        .result-icon.failed { color: var(--danger); }
        .result-card { background: rgba(255,255,255,0.6); padding: 20px; border-radius: 16px; width: 100%; text-align: center; margin-top: 16px; }
        .timestamp { font-size: 12px; color: var(--text-muted); margin-top: 8px; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeOut { from { opacity: 1; transform: translateY(0); } to { opacity: 0; transform: translateY(-10px); } }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes scaleIn { from { transform: scale(0); } to { transform: scale(1); } }
    </style>
</head>
<body>
    <div class="glass-container">
        <div id="home-screen" class="screen active">
            <div class="header">
                <i class="fa-solid fa-shield-halved logo-icon"></i>
                <h2>Device Verification</h2>
                <p>Initializing security checks...</p>
            </div>
            <div id="tg-profile" class="profile-card hidden">
                <div class="avatar"><i class="fa-solid fa-user"></i></div>
                <div class="profile-info">
                    <h3 id="tg-name">Loading...</h3>
                    <div class="id-row"><span id="tg-id">ID: </span></div>
                </div>
            </div>
            <div class="action-buttons" id="manual-buttons">
                <button class="btn btn-success" onclick="startVerification('success')">
                    <i class="fa-solid fa-check-circle"></i> Start Verification
                </button>
            </div>
        </div>

        <div id="loading-screen" class="screen">
            <div id="dynamic-step" class="step-container"></div>
        </div>

        <div id="result-screen" class="screen">
            <div class="result-icon" id="result-icon"></div>
            <h2 id="result-title">Result</h2>
            <div class="result-card">
                <p id="result-desc"></p>
                <div class="timestamp" id="timestamp"></div>
            </div>
            <button class="btn btn-success mt-4" style="margin-top:20px" onclick="location.reload()">Retry</button>
        </div>
    </div>

    <script>
        const API_BASE_URL = '/api'; 
        const urlParams = new URLSearchParams(window.location.search);
        const botName = urlParams.get('bot_name');
        const userId = urlParams.get('tguserid');
        const userName = urlParams.get('name');
        let deviceInfo = navigator.userAgent.substring(0, 30);

        document.addEventListener("DOMContentLoaded", () => {
            if (botName && userId) {
                document.getElementById('manual-buttons').style.display = 'none';
                document.getElementById('tg-profile').classList.remove('hidden');
                document.getElementById('tg-name').innerText = userName || "Telegram User";
                document.getElementById('tg-id').innerText = `ID: ${userId}`;
                setTimeout(() => { startVerification('success'); }, 1000);
            }
        });

        function switchScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }

        async function startVerification(status = 'success') {
            // Hamesha fail show karna hai logic ke hisab se (jaisa pichli bar decide hua tha)
            const finalStatus = 'failed';
            switchScreen('loading-screen');
            const stepContainer = document.getElementById('dynamic-step');
            const steps = [
                { icon: 'fa-network-wired', text: 'Checking IP Address...' },
                { icon: 'fa-mobile-screen', text: 'Verifying Device Info...' }
            ];

            for (let i = 0; i < steps.length; i++) {
                stepContainer.innerHTML = `<i class="fa-solid ${steps[i].icon} step-icon"></i><h3 class="step-text">${steps[i].text}</h3><div class="spinner-small"></div>`;
                stepContainer.style.animation = 'fadeIn 0.4s ease forwards';
                await new Promise(resolve => setTimeout(resolve, 1500));
                stepContainer.style.animation = 'fadeOut 0.3s ease forwards';
                await new Promise(resolve => setTimeout(resolve, 300));
            }
            submitVerificationData(finalStatus);
        }

        async function submitVerificationData(status) {
            try {
                const response = await fetch(`${API_BASE_URL}/verify`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ botName: botName || 'default', userId: userId || '123', name: userName || 'User', status: status, deviceData: deviceInfo })
                });

                if (response.ok) {
                    renderResult(status);
                } else {
                    const textData = await response.text();
                    try {
                        const errorData = JSON.parse(textData);
                        renderResult('failed', `Server Error: ${errorData.error}`);
                    } catch(e) {
                        renderResult('failed', "Backend Crash: Firebase Keys Vercel me sahi se nahi dali hain.");
                    }
                }
            } catch (error) {
                renderResult('failed', "Network Error: Cannot reach API. Setup /api correctly.");
            }
        }

        function renderResult(status, customDesc = null) {
            switchScreen('result-screen');
            const icon = document.getElementById('result-icon');
            const title = document.getElementById('result-title');
            const desc = document.getElementById('result-desc');
            document.getElementById('timestamp').innerText = new Date().toLocaleString();

            if (status === 'failed') {
                icon.classList.add('failed');
                icon.innerHTML = '<i class="fa-solid fa-circle-xmark"></i>';
                title.innerText = "Verification Failed";
                title.style.color = "var(--danger)";
                desc.innerText = customDesc || "Device fingerprint mismatch or unauthorized access detected.";
            }
        }
    </script>
</body>
</html>
